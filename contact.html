<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Auto-Trade Hub</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #eef2f5;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background: linear-gradient(to right, #003366, #005599);
      color: white;
      padding: 25px;
      text-align: center;
    }

    header h1 {
      margin-bottom: 5px;
    }

    nav {
      background-color: #004080;
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ffcc00;
    }

    .contact-section {
      max-width: 650px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .contact-section:hover {
      transform: translateY(-4px);
    }

    .contact-section h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #003366;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      transition: border 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #005599;
      box-shadow: 0 0 6px rgba(0, 85, 153, 0.4);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #005599;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s;
    }

    button:hover {
      background-color: #003f73;
      transform: translateY(-2px);
    }

    footer {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 50px;
    }

    @media (max-width: 768px) {
      .contact-section {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Contact the Owner - Auto-Trade Hub</h1>
    <p>Reach out to us with your questions or feedback</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="home.html">Home</a>
    <a href="buy.html">Buy</a>
    <a href="sell.html">Sell</a>
    <a href="login.html">Login</a>
  </nav>

  <!-- Contact Form -->
  <section class="contact-section">
    <h2>Contact Form</h2>
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Enter subject" required>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Auto-Trade Hub | Owned by Ryan</p>
  </footer>

  <!-- JavaScript -->
  <script>
    document.getElementById("contactForm").addEventListener("submit", function(event){
      event.preventDefault();

      const email = document.getElementById("email").value;
      const confirmEmail = prompt("Please confirm your email before sending:", email);

      if (confirmEmail && confirmEmail === email) {
        alert("✅ Thank you! Your message has been sent successfully. We’ll get back to you soon.");
        this.reset();
      } else {
        alert("❌ Email confirmation failed. Please try again.");
      }
    });
  </script>

</body>
</html>
