<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Your Bike - Auto-Trade Hub</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f2f6fa;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background: linear-gradient(to right, #003366, #005599);
      color: white;
      padding: 25px;
      text-align: center;
    }

    header h1 {
      margin-bottom: 5px;
      font-size: 2rem;
    }

    nav {
      background-color: #004080;
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ffcc00;
    }

    .form-section {
      max-width: 650px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .form-section:hover {
      transform: translateY(-4px);
    }

    .form-section h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #003366;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      transition: border 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #005599;
      box-shadow: 0 0 6px rgba(0, 85, 153, 0.4);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background-color: #005599;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s;
    }

    button:hover {
      background-color: #003f73;
      transform: translateY(-2px);
    }

    footer {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 50px;
    }

    @media (max-width: 768px) {
      .form-section {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Sell Your Bike - Auto-Trade Hub</h1>
    <p>Submit your bike details and connect with buyers</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="home.html">Home</a>
    <a href="buy.html">Buy</a>
    <a href="login.html">Login</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Selling Form -->
  <section class="form-section">
    <h2>Bike Selling Form</h2>
    <form id="sellForm">
      <div class="form-group">
        <label for="ownerName">Your Name</label>
        <input type="text" id="ownerName" name="ownerName" required>
      </div>

      <div class="form-group">
        <label for="bikeModel">Bike Model</label>
        <input type="text" id="bikeModel" name="bikeModel" required>
      </div>

      <div class="form-group">
        <label for="year">Year of Purchase</label>
        <input type="number" id="year" name="year" min="2000" max="2025" required>
      </div>

      <div class="form-group">
        <label for="price">Expected Price (INR)</label>
        <input type="number" id="price" name="price" required>
      </div>

      <div class="form-group">
        <label for="mileage">Mileage (in KM)</label>
        <input type="number" id="mileage" name="mileage">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Additional details about your bike..."></textarea>
      </div>

      <div class="form-group">
        <label for="contact">Contact Number</label>
        <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" required>
      </div>

      <button type="submit">Submit Listing</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Auto-Trade Hub. All rights reserved.</p>
  </footer>

  <!-- jQuery Script -->
  <script>
    $(document).ready(function(){
      $("#sellForm").on("submit", function(event){
        event.preventDefault(); // stop form refresh

        // simple confirmation popup
        alert("✅ Thank you! Your bike listing has been submitted successfully.");

        // reset form
        this.reset();
      });
    });
  </script>

</body>
</html>
